<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" fill="none">
  <defs>
    <linearGradient id="wash" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F7F3EA" stop-opacity="0.35"/>
      <stop offset="50%" stop-color="#F3EFE6" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#EBE4D6" stop-opacity="0.4"/>
    </linearGradient>
    <linearGradient id="redSoft" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C97B4B" stop-opacity="0.42"/>
      <stop offset="100%" stop-color="#B85F45" stop-opacity="0.28"/>
    </linearGradient>
    <linearGradient id="blueSoft" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4A6D8C" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#0B1F33" stop-opacity="0.38"/>
    </linearGradient>
    <filter id="softBlur" x="-5%" y="-5%" width="110%" height="110%">
      <feGaussianBlur stdDeviation="1.2"/>
    </filter>
    <pattern id="stars" width="48" height="40" patternUnits="userSpaceOnUse">
      <path d="M12 8l1.4 4.2H18l-3.4 2.5 1.3 4.1L12 16.4l-3.9 2.4 1.3-4.1L6 12.2h4.6L12 8z" fill="#F3EFE6" opacity="0.55"/>
      <path d="M36 28l1.1 3.2H41l-2.6 1.9 1 3.1-2.9-1.8-2.9 1.8 1-3.1-2.6-1.9h3.9L36 28z" fill="#F3EFE6" opacity="0.4"/>
    </pattern>
  </defs>

  <!-- Soft fabric base -->
  <rect width="1200" height="675" fill="#F6F1E7"/>

